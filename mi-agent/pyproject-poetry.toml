[tool.poetry]
name = "mi-agent"
version = "0.1.0"
description = "Agente investigador financiero LATAM con LangGraph"
authors = []

[tool.poetry.dependencies]
python = "^3.11"
langgraph = ">=0.2.0"
langchain-core = ">=0.3.0"
langchain-openai = ">=0.2.0"
qdrant-client = ">=1.12.0"
tavily-python = ">=0.5.0"
fastapi = ">=0.115.0"
uvicorn = ">=0.32.0"
streamlit = ">=1.40.0"
httpx = ">=0.28.0"
pydantic = ">=2.9.0"
pydantic-settings = ">=2.6.0"
python-dotenv = ">=1.0.1"
pytest = ">=8.3.0"
pytest-asyncio = ">=0.24.0"

[tool.poetry.dev-dependencies]
ruff = ">=0.8.0"
mypy = ">=1.13.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
