version: '3.8'

services:
  intelligence-brief:
    build: .
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python scripts/main.py
    
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

volumes:
  qdrant_data: